name: Build and Push Docker Image to DockerHub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build and Push Image
      - name: Build and Push Docker Image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/qtec-devops-task"

          docker build . -t ${IMAGE_NAME}:${SHORT_SHA}
          docker tag ${IMAGE_NAME}:${SHORT_SHA} ${IMAGE_NAME}:latest

          docker push ${IMAGE_NAME}:${SHORT_SHA}
          docker push ${IMAGE_NAME}:latest


  update-deployment-file:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 1️⃣ Clone GitOps repo
      - name: Clone Deployment Repository
        run: |
          git clone --branch main https://abrahimcse:${{ secrets.ACCESS_TOKEN }}@github.com/abrahimcse/qtec-devops-app-deploy.git

      # 2️⃣ Update image tag
      - name: Update Deployment File
        run: |
          cd qtec-devops-app-deploy
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/qtec-devops-task:${SHORT_SHA}|g" k8s/deployment.yaml

      # 3️⃣ Commit & Push
      - name: Commit and Push Changes
        run: |
          cd qtec-devops-app-deploy
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${SHORT_SHA}"
          git push https://abrahimcse:${{ secrets.ACCESS_TOKEN }}@github.com/abrahimcse/qtec-devops-app-deploy.git